<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - 极简论坛</title>
    <link href="https://cdn.osyb.cn/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.osyb.cn/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
    <div class="container" id="app">
        <div class="d-flex justify-content-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.osyb.cn/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/post.js"></script>

    <div class="modal fade" id="posterModal" tabindex="-1" aria-labelledby="posterModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="posterModalLabel">分享海报</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="theme-selector mb-3">
                        <label class="form-label">选择主题</label>
                        <div class="d-flex gap-2 flex-wrap" id="themeButtons">
                        </div>
                    </div>
                    <div id="posterContainer" class="d-flex justify-content-center align-items-center" style="min-height: 400px; background: #f3f4f6; border-radius: 8px;">
                        <div class="text-muted">
                            <div class="spinner-border text-primary mb-2 d-none" id="posterLoading" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p id="posterPlaceholder" class="mb-0">点击生成海报</p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary" id="downloadPosterBtn" disabled>
                        <i class="bi bi-download me-1"></i>下载海报
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
