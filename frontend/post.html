<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - 极简论坛</title>
    <link href="https://cdn.osyb.cn/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.osyb.cn/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
    <div class="container" id="app">
        <div class="d-flex justify-content-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.osyb.cn/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/post.js"></script>

    <div class="modal fade" id="posterModal" tabindex="-1" aria-labelledby="posterModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="posterModalLabel">分享海报</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="theme-selector mb-3">
                        <label class="form-label">选择主题</label>
                        <div class="d-flex gap-2 flex-wrap" id="themeButtons">
                        </div>
                    </div>
                    <div id="posterContainer" class="d-flex justify-content-center align-items-center" style="min-height: 400px; background: #f3f4f6; border-radius: 8px;">
                        <div class="text-muted">
                            <div class="spinner-border text-primary mb-2 d-none" id="posterLoading" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p id="posterPlaceholder" class="mb-0">点击生成海报</p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary" id="downloadPosterBtn" disabled>
                        <i class="bi bi-download me-1"></i>下载海报
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="ttsUnsupportedAlert" class="alert alert-warning alert-dismissible fade show d-none" role="alert" style="position: fixed; top: 20px; right: 20px; z-index: 2000; max-width: 400px;">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span>您的浏览器不支持语音朗读功能，请使用 Chrome、Edge 或 Safari 最新版本。</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div id="ttsControlBar" class="tts-control-bar d-none">
        <div class="container">
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center gap-2">
                    <button id="ttsPlayPauseBtn" class="tts-btn tts-btn-primary" title="播放/暂停">
                        <i class="bi bi-play-fill"></i>
                    </button>
                    <button id="ttsStopBtn" class="tts-btn tts-btn-secondary" title="停止">
                        <i class="bi bi-stop-fill"></i>
                    </button>
                </div>

                <div class="vr bg-light opacity-25"></div>

                <div class="d-flex align-items-center gap-2">
                    <label class="tts-label text-nowrap mb-0">
                        <i class="bi bi-speedometer2 me-1"></i>语速
                    </label>
                    <input type="range" id="ttsRateSlider" class="tts-rate-slider" min="0.5" max="2" step="0.1" value="1">
                    <span id="ttsRateValue" class="tts-rate-value text-nowrap">1.0x</span>
                </div>

                <div class="vr bg-light opacity-25"></div>

                <div class="d-flex align-items-center gap-2 flex-grow-1">
                    <label class="tts-label text-nowrap mb-0">
                        <i class="bi bi-person-voice me-1"></i>嗓音
                    </label>
                    <select id="ttsVoiceSelect" class="tts-voice-select form-select form-select-sm">
                        <option value="">加载中...</option>
                    </select>
                </div>

                <div class="d-flex align-items-center gap-2">
                    <span id="ttsProgress" class="tts-progress text-nowrap text-muted">0 / 0</span>
                </div>

                <button id="ttsCloseBtn" class="tts-btn tts-btn-secondary" title="关闭">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
