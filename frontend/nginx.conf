server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        # Strip /api prefix when forwarding to backend if backend expects root paths
        # But in our case, backend/api is the structure. 
        # Let's check backend structure:
        # backend/api/posts.php -> mapped to /var/www/html/api/posts.php
        # So we should forward /api/ directly to backend.
        
        proxy_pass http://backend:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
